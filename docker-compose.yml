services:
  api:
    build: .
    command: uvicorn src.main:app --host 0.0.0.0 --port 8000 --reload
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - ./:/app
    depends_on:
      - db
      - redis

  worker:
    build: .
    command: celery -A src.tasks.worker.celery_app worker --loglevel=info
    env_file:
      - .env
    volumes:
      - ./:/app
    depends_on:
      - db
      - redis

  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ragprobe}
      POSTGRES_USER: ${POSTGRES_USER:-ragprobe}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ragprobe}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  postgres_data:
